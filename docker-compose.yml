services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    image: ${APP_IMAGE:-laravel-app}
    volumes:
      - .:/var/www
    depends_on:
      db:
        condition: service_healthy

  nginx:
    image: ${NGINX_IMAGE:-nginx:alpine}
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  db:
    image: ${DB_IMAGE:-mysql:8.0}
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p${DB_ROOT_PASSWORD:-root} --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 20s

  redis:
    image: ${REDIS_IMAGE:-redis:alpine}

  queue:
    image: ${APP_IMAGE:-laravel-app}
    command: ${QUEUE_WORKER_COMMAND:-php artisan queue:work}
    volumes:
      - .:/var/www
    depends_on:
      app:
        condition: service_started
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    name: ${DB_VOLUME_NAME:-laravel-app_db_data}
